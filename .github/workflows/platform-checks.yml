name: Platform Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build all platform Go modules
        run: |
          for m in framework-go framework-go-infrastructure-*; do
            echo "== $m =="
            ( cd "$m" && GOWORK=off go build ./... )
          done
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b /usr/local/bin
      - name: Lint all platform Go modules
        run: |
          for m in framework-go framework-go-infrastructure-*; do
            echo "== $m =="
            ( cd "$m" && GOWORK=off golangci-lint run ./... )
          done
      - name: Test all platform Go modules
        run: |
          for m in framework-go framework-go-infrastructure-*; do
            echo "== $m =="
            ( cd "$m" && GOWORK=off go test ./... )
          done
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: framework-web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build
